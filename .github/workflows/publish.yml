name: Publish Docker image

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: lordjabez/claude-code:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Claude Code version
        id: version
        run: |
          version=$(docker run --rm --entrypoint claude lordjabez/claude-code:local --version | grep -oP '\d+\.\d+\.\d+')
          echo "tag=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            lordjabez/claude-code:latest
            lordjabez/claude-code:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
